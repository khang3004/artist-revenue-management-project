version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: artist_revenue_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-artist_revenue_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d/migrations
      - ./db/seeds:/docker-entrypoint-initdb.d/seeds
      - ./db/procedures:/docker-entrypoint-initdb.d/procedures
    networks:
      - artist_revenue_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: artist_revenue_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      - postgres
    networks:
      - artist_revenue_network
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  streamlit:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: artist_revenue_streamlit
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-artist_revenue_db}
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - artist_revenue_network
    volumes:
      - ./app:/app
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0

volumes:
  postgres_data:
  pgadmin_data:

networks:
  artist_revenue_network:
    driver: bridge
